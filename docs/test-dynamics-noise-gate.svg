<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Consolas, monospace" font-size="13">
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334"/>
    </marker>
    <marker id="arrow2g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2a7"/>
    </marker>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef0f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="url(#bg2)" stroke="#c0c4cc" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#223">testNoiseGate_passesSignal</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#667">NoiseGateCADBlock  &#8212;  AudioBlockFunctionTest.java</text>

  <!-- ================================================================ -->
  <!-- INPUT SIGNAL SECTION -->
  <!-- ================================================================ -->
  <rect x="30" y="72" width="260" height="175" rx="8" fill="#fff" stroke="#b0b8c4" stroke-width="1"/>
  <text x="160" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#334">Input Signal</text>

  <!-- Sine wave -->
  <g transform="translate(50,108)">
    <line x1="0" y1="55" x2="220" y2="55" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="110" stroke="#aab" stroke-width="0.8"/>
    <text x="-5" y="8" text-anchor="end" font-size="10" fill="#778">+0.25</text>
    <text x="-5" y="59" text-anchor="end" font-size="10" fill="#778">0</text>
    <text x="-5" y="113" text-anchor="end" font-size="10" fill="#778">-0.25</text>
    <text x="110" y="128" text-anchor="middle" font-size="10" fill="#778">0.5 s  (16384 samples @ 32768 Hz)</text>
    <path d="M0,55 C4,30 8,5 12,5 C16,5 20,30 24,55 C28,80 32,105 36,105 C40,105 44,80 48,55
             C52,30 56,5 60,5 C64,5 68,30 72,55 C76,80 80,105 84,105 C88,105 92,80 96,55
             C100,30 104,5 108,5 C112,5 116,30 120,55 C124,80 128,105 132,105 C136,105 140,80 144,55
             C148,30 152,5 156,5 C160,5 164,30 168,55 C172,80 176,105 180,105 C184,105 188,80 192,55
             C196,30 200,5 204,5 C208,5 212,30 216,55"
          fill="none" stroke="#3577d4" stroke-width="2"/>
  </g>
  <text x="50" y="258" font-size="11" fill="#445">1 kHz sine  &#183;  amplitude = 0.25</text>

  <!-- ================================================================ -->
  <!-- SIGNAL FLOW DIAGRAM -->
  <!-- ================================================================ -->
  <rect x="310" y="72" width="560" height="175" rx="8" fill="#fff" stroke="#b0b8c4" stroke-width="1"/>
  <text x="590" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#334">Block Signal Flow</text>

  <!-- Input box -->
  <rect x="325" y="145" width="65" height="32" rx="4" fill="#e3ecf7" stroke="#6b8fc0" stroke-width="1.2"/>
  <text x="357" y="164" text-anchor="middle" font-size="10" fill="#334">Audio In</text>

  <!-- Scale by thresh -->
  <rect x="412" y="110" width="70" height="28" rx="4" fill="#fef3e0" stroke="#d4a54a" stroke-width="1.2"/>
  <text x="447" y="128" text-anchor="middle" font-size="10" fill="#665">&#215; thresh</text>
  <text x="447" y="103" text-anchor="middle" font-size="9" fill="#998">default: 0.02</text>

  <!-- ABS -->
  <rect x="500" y="110" width="42" height="28" rx="4" fill="#fef3e0" stroke="#d4a54a" stroke-width="1.2"/>
  <text x="521" y="128" text-anchor="middle" font-size="10" fill="#665">|x|</text>

  <!-- LP filter -->
  <rect x="560" y="110" width="80" height="28" rx="4" fill="#fef3e0" stroke="#d4a54a" stroke-width="1.2"/>
  <text x="600" y="128" text-anchor="middle" font-size="10" fill="#665">RDFX 0.9998</text>

  <!-- x1.999 -->
  <rect x="658" y="110" width="56" height="28" rx="4" fill="#fef3e0" stroke="#d4a54a" stroke-width="1.2"/>
  <text x="686" y="128" text-anchor="middle" font-size="10" fill="#665">&#215;1.999</text>

  <!-- Multiply node -->
  <circle cx="746" cy="161" r="14" fill="#e8f5e9" stroke="#4a9" stroke-width="1.5"/>
  <text x="746" y="165" text-anchor="middle" font-size="14" fill="#2a7">&#215;</text>

  <!-- Output box -->
  <rect x="778" y="145" width="72" height="32" rx="4" fill="#e3ecf7" stroke="#6b8fc0" stroke-width="1.2"/>
  <text x="814" y="164" text-anchor="middle" font-size="10" fill="#334">Audio Out</text>

  <!-- Arrows: detection path (top) -->
  <line x1="370" y1="145" x2="370" y2="124" stroke="#d4a54a" stroke-width="1.2"/>
  <line x1="370" y1="124" x2="410" y2="124" stroke="#d4a54a" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <line x1="482" y1="124" x2="498" y2="124" stroke="#d4a54a" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <line x1="542" y1="124" x2="558" y2="124" stroke="#d4a54a" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <line x1="640" y1="124" x2="656" y2="124" stroke="#d4a54a" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <!-- Arrow: gate down to multiply -->
  <line x1="714" y1="124" x2="746" y2="124" stroke="#9a6cb8" stroke-width="1.2"/>
  <line x1="746" y1="124" x2="746" y2="145" stroke="#9a6cb8" stroke-width="1.2" marker-end="url(#arrow2)"/>
  <text x="752" y="120" font-size="9" fill="#9a6cb8">gate</text>

  <!-- Arrow: input straight to multiply -->
  <line x1="390" y1="161" x2="730" y2="161" stroke="#3577d4" stroke-width="1.5" marker-end="url(#arrow2g)"/>
  <text x="555" y="176" text-anchor="middle" font-size="9" fill="#3577d4">dry signal path</text>

  <!-- Arrow: multiply to output -->
  <line x1="760" y1="161" x2="776" y2="161" stroke="#2a7" stroke-width="1.2" marker-end="url(#arrow2g)"/>

  <!-- Label: detection sidechain -->
  <text x="550" y="103" text-anchor="middle" font-size="10" fill="#d4a54a">envelope detection path</text>

  <!-- Gate behavior annotation -->
  <g transform="translate(340,195)">
    <text x="0" y="0" font-size="10" fill="#667">Gate behavior:  signal &#215; thresh &#8594; rectify &#8594; slow-release LP &#8594; &#215;2</text>
    <text x="0" y="15" font-size="10" fill="#667">Loud input (0.25 amp) &#187; thresh (0.02) &#8594; gate opens &#8594; signal passes</text>
  </g>

  <!-- ================================================================ -->
  <!-- OUTPUT SIGNAL SECTION -->
  <!-- ================================================================ -->
  <rect x="30" y="265" width="410" height="175" rx="8" fill="#fff" stroke="#b0b8c4" stroke-width="1"/>
  <text x="235" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#334">Output Signal</text>

  <g transform="translate(50,300)">
    <line x1="0" y1="55" x2="370" y2="55" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="110" stroke="#aab" stroke-width="0.8"/>
    <line x1="185" y1="0" x2="185" y2="110" stroke="#ccd" stroke-width="0.8" stroke-dasharray="4,3"/>
    <text x="185" y="125" text-anchor="middle" font-size="9" fill="#99a">0.25 s (transient)</text>
    <text x="278" y="125" text-anchor="middle" font-size="9" fill="#2a7">steady-state measurement</text>

    <text x="-5" y="8" text-anchor="end" font-size="10" fill="#778">+</text>
    <text x="-5" y="59" text-anchor="end" font-size="10" fill="#778">0</text>
    <text x="-5" y="113" text-anchor="end" font-size="10" fill="#778">-</text>

    <!-- Transient: gate opening, amplitude grows -->
    <path d="M0,55 C2,52 5,48 7,48 C9,48 12,52 14,55 C16,58 19,62 21,62 C23,62 26,58 28,55
             C30,50 33,42 35,42 C37,42 40,50 42,55 C44,60 47,68 49,68 C51,68 54,60 56,55
             C58,47 61,35 63,35 C65,35 68,47 70,55 C72,63 75,75 77,75 C79,75 82,63 84,55
             C86,44 89,28 91,28 C93,28 96,44 98,55 C100,66 103,82 105,82 C107,82 110,66 112,55
             C114,42 117,24 119,24 C121,24 124,42 126,55 C128,68 131,86 133,86 C135,86 138,68 140,55
             C142,40 145,20 147,20 C149,20 152,40 154,55 C156,70 159,90 161,90 C163,90 166,70 168,55
             C170,38 173,16 175,16 C177,16 180,38 182,55"
          fill="none" stroke="#3577d4" stroke-width="1.5" opacity="0.35"/>

    <!-- Steady-state (full amplitude, gate fully open) -->
    <path d="M185,55 C188,36 192,14 195,14 C198,14 202,36 205,55 C208,74 212,96 215,96 C218,96 222,74 225,55
             C228,36 232,14 235,14 C238,14 242,36 245,55 C248,74 252,96 255,96 C258,96 262,74 265,55
             C268,36 272,14 275,14 C278,14 282,36 285,55 C288,74 292,96 295,96 C298,96 302,74 305,55
             C308,36 312,14 315,14 C318,14 322,36 325,55 C328,74 332,96 335,96 C338,96 342,74 345,55
             C348,36 352,14 355,14 C358,14 362,36 365,55"
          fill="none" stroke="#2a7" stroke-width="2"/>

    <rect x="185" y="-4" width="185" height="118" rx="4" fill="none" stroke="#2a7" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- ================================================================ -->
  <!-- TEST CRITERIA SECTION -->
  <!-- ================================================================ -->
  <rect x="460" y="265" width="410" height="175" rx="8" fill="#fff" stroke="#b0b8c4" stroke-width="1"/>
  <text x="665" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#334">Test Criteria</text>

  <rect x="480" y="300" width="370" height="40" rx="6" fill="#eef7ee" stroke="#4a9" stroke-width="1"/>
  <text x="495" y="316" font-size="12" font-weight="bold" fill="#2a7">ASSERT 1: assertNotNull(gain)</text>
  <text x="495" y="332" font-size="11" fill="#445">Simulation must complete without error</text>

  <rect x="480" y="350" width="370" height="40" rx="6" fill="#eef7ee" stroke="#4a9" stroke-width="1"/>
  <text x="495" y="366" font-size="12" font-weight="bold" fill="#2a7">ASSERT 2: gain &gt; -12.0 dB</text>
  <text x="495" y="382" font-size="11" fill="#445">Gate must open for strong signal (amplitude 0.25)</text>

  <!-- dB scale bar -->
  <g transform="translate(490,402)">
    <rect x="0" y="8" width="350" height="18" rx="3" fill="#f0f2f5" stroke="#ccd" stroke-width="0.8"/>
    <rect x="0" y="8" width="297" height="18" rx="3" fill="#fee" stroke="none"/>
    <rect x="297" y="8" width="53" height="18" rx="3" fill="#dfd" stroke="none"/>
    <line x1="297" y1="6" x2="297" y2="28" stroke="#c44" stroke-width="1.5"/>
    <text x="297" y="4" text-anchor="middle" font-size="10" fill="#c44" font-weight="bold">-12 dB</text>
    <text x="350" y="4" text-anchor="end" font-size="10" fill="#2a7">0 dB</text>
    <text x="0" y="4" font-size="10" fill="#c44">-80 dB</text>
    <text x="323" y="21" text-anchor="middle" font-size="9" fill="#2a7" font-weight="bold">PASS</text>
    <text x="148" y="21" text-anchor="middle" font-size="9" fill="#c44">FAIL</text>
  </g>

  <!-- ================================================================ -->
  <!-- MEASUREMENT METHOD -->
  <!-- ================================================================ -->
  <rect x="30" y="458" width="840" height="145" rx="8" fill="#fff" stroke="#b0b8c4" stroke-width="1"/>
  <text x="450" y="480" text-anchor="middle" font-size="14" font-weight="bold" fill="#334">Measurement Method</text>

  <text x="50" y="502" font-size="12" fill="#445">1. Generate stereo 16-bit WAV: 1 kHz sine, amplitude 0.25, duration 0.5 s, sample rate 32768 Hz</text>
  <text x="50" y="522" font-size="12" fill="#445">2. Wire: InputCADBlock &#8594; NoiseGateCADBlock &#8594; OutputCADBlock ("Audio Out" pin)</text>
  <text x="50" y="542" font-size="12" fill="#445">3. Run SpinSimulator (loopMode=false, pot values 0.5/0.5/0.5)  &#183;  thresh default = 0.02</text>
  <text x="50" y="562" font-size="12" fill="#445">4. Measure: RMS of left channel, second half only (samples 8192&#8211;16383) to skip gate-opening transient</text>
  <text x="50" y="582" font-size="12" fill="#445">5. Gain = 20 &#183; log&#8321;&#8320;( outputRMS / inputRMS )  where inputRMS = 0.25 &#215; 32767 / &#8730;2</text>
</svg>
