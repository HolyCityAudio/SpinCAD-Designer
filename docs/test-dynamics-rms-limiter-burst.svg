<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Consolas, monospace" font-size="12">
  <defs>
    <linearGradient id="bgrl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef0f4"/>
    </linearGradient>
  </defs>

  <rect width="960" height="720" rx="12" fill="url(#bgrl)" stroke="#c0c4cc" stroke-width="1.5"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#223">RMS Limiter &#8212; Tone Burst Envelope Test</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#667">DynamicsEnvelopeTest.java  &#183;  440 Hz bursts, 200 ms on / 200 ms off, -80 to 0 dBFS  &#183;  inGain=0.1</text>

  <!-- ================================================================ -->
  <!-- INPUT STAIRCASE -->
  <!-- ================================================================ -->
  <rect x="30" y="62" width="900" height="130" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="40" y="80" font-size="13" font-weight="bold" fill="#334">Input Signal</text>

  <g transform="translate(60,88)">
    <line x1="0" y1="0" x2="0" y2="85" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="85" x2="840" y2="85" stroke="#aab" stroke-width="0.8"/>
    <text x="-8" y="6" text-anchor="end" font-size="9" fill="#778">0 dB</text>
    <text x="-8" y="48" text-anchor="end" font-size="9" fill="#778">-40</text>
    <text x="-8" y="88" text-anchor="end" font-size="9" fill="#778">-80</text>

    <rect x="0" y="84" width="43" height="1" fill="#3577d4" opacity="0.4"/>
    <rect x="93" y="81" width="43" height="4" fill="#3577d4" opacity="0.4"/>
    <rect x="186" y="74" width="43" height="11" fill="#3577d4" opacity="0.5"/>
    <rect x="279" y="64" width="43" height="21" fill="#3577d4" opacity="0.5"/>
    <rect x="372" y="43" width="43" height="42" fill="#3577d4" opacity="0.6"/>
    <rect x="465" y="22" width="43" height="63" fill="#3577d4" opacity="0.7"/>
    <rect x="558" y="11" width="43" height="74" fill="#3577d4" opacity="0.8"/>
    <rect x="651" y="5" width="43" height="80" fill="#3577d4" opacity="0.85"/>
    <rect x="744" y="1" width="43" height="84" fill="#3577d4" opacity="0.9"/>

    <text x="23" y="98" text-anchor="middle" font-size="8" fill="#99a">-80</text>
    <text x="116" y="98" text-anchor="middle" font-size="8" fill="#99a">-70</text>
    <text x="209" y="98" text-anchor="middle" font-size="8" fill="#99a">-60</text>
    <text x="302" y="98" text-anchor="middle" font-size="8" fill="#99a">-50</text>
    <text x="395" y="98" text-anchor="middle" font-size="8" fill="#99a">-40</text>
    <text x="488" y="98" text-anchor="middle" font-size="8" fill="#99a">-30</text>
    <text x="581" y="98" text-anchor="middle" font-size="8" fill="#99a">-20</text>
    <text x="674" y="98" text-anchor="middle" font-size="8" fill="#99a">-10</text>
    <text x="767" y="98" text-anchor="middle" font-size="8" fill="#99a">0</text>
  </g>

  <!-- ================================================================ -->
  <!-- OUTPUT ENVELOPE showing dead zone + active zone -->
  <!-- ================================================================ -->
  <rect x="30" y="200" width="900" height="155" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="40" y="220" font-size="13" font-weight="bold" fill="#334">Output Envelope (showing threshold dead zone)</text>

  <g transform="translate(60,232)">
    <line x1="0" y1="0" x2="0" y2="100" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="100" x2="840" y2="100" stroke="#aab" stroke-width="0.8"/>
    <text x="-8" y="6" text-anchor="end" font-size="9" fill="#778">0 dB</text>
    <text x="-8" y="31" text-anchor="end" font-size="9" fill="#778">-20</text>
    <text x="-8" y="56" text-anchor="end" font-size="9" fill="#778">-40</text>
    <text x="-8" y="81" text-anchor="end" font-size="9" fill="#778">-60</text>
    <text x="-8" y="103" text-anchor="end" font-size="9" fill="#778">-80</text>

    <!-- Burst boundaries -->
    <line x1="93" y1="0" x2="93" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="186" y1="0" x2="186" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="279" y1="0" x2="279" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="372" y1="0" x2="372" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="465" y1="0" x2="465" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="558" y1="0" x2="558" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="651" y1="0" x2="651" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="744" y1="0" x2="744" y2="100" stroke="#eef" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Dead zone: -80 to -40 dBFS → output stuck at ~-93 dB (noise floor) -->
    <rect x="0" y="86" width="415" height="14" rx="3" fill="#fee" opacity="0.3"/>
    <text x="207" y="82" text-anchor="middle" font-size="10" fill="#c44" font-weight="bold">DEAD ZONE: output at noise floor (~-93 dB)</text>

    <!-- -80 to -40: tiny bars at noise floor -->
    <rect x="0" y="97" width="43" height="3" fill="#c44" opacity="0.3"/>
    <rect x="93" y="97" width="43" height="3" fill="#c44" opacity="0.3"/>
    <rect x="186" y="97" width="43" height="3" fill="#c44" opacity="0.3"/>
    <rect x="279" y="97" width="43" height="3" fill="#c44" opacity="0.3"/>
    <rect x="372" y="97" width="43" height="3" fill="#c44" opacity="0.3"/>

    <!-- Active zone: -30 dBFS onward -->
    <!-- -30: out=-29.5 → y=37 -->
    <rect x="465" y="37" width="43" height="63" fill="#2a7" opacity="0.7"/>
    <!-- -20: out=-19.5 → y=24 -->
    <rect x="558" y="24" width="43" height="76" fill="#2a7" opacity="0.8"/>
    <!-- -10: out=-9.5 → y=12 -->
    <rect x="651" y="12" width="43" height="88" fill="#2a7" opacity="0.85"/>
    <!-- 0: out=-1.5 → y=2 -->
    <rect x="744" y="2" width="43" height="98" fill="#2a7" opacity="0.95"/>

    <!-- Input outlines for active zone -->
    <rect x="465" y="22" width="43" height="63" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="558" y="12" width="43" height="74" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="651" y="6" width="43" height="80" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="744" y="1" width="43" height="84" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>

    <!-- Threshold line -->
    <line x1="440" y1="0" x2="440" y2="100" stroke="#d4a54a" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="443" y="10" font-size="9" fill="#d4a54a" font-weight="bold">threshold</text>
    <text x="443" y="22" font-size="9" fill="#d4a54a">~-30 dBFS</text>
  </g>

  <!-- Legend -->
  <rect x="60" y="340" width="12" height="8" fill="#2a7" opacity="0.7"/>
  <text x="78" y="348" font-size="10" fill="#445">Output</text>
  <rect x="150" y="340" width="12" height="8" fill="none" stroke="#3577d4" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="168" y="348" font-size="10" fill="#445">Input</text>
  <rect x="240" y="340" width="12" height="8" fill="#c44" opacity="0.3"/>
  <text x="258" y="348" font-size="10" fill="#445">Below threshold (noise floor)</text>

  <!-- ================================================================ -->
  <!-- GAIN CURVE -->
  <!-- ================================================================ -->
  <rect x="30" y="365" width="440" height="210" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="250" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#334">Gain vs Input Level</text>

  <g transform="translate(90,400)">
    <line x1="0" y1="0" x2="0" y2="150" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="150" x2="350" y2="150" stroke="#aab" stroke-width="0.8"/>
    <!-- Y: +10 to -60 dB. 0dB at y=21, scale: 2.14px per dB -->
    <text x="-8" y="5" text-anchor="end" font-size="9" fill="#778">+10</text>
    <text x="-8" y="26" text-anchor="end" font-size="9" fill="#778">0</text>
    <text x="-8" y="69" text-anchor="end" font-size="9" fill="#778">-20</text>
    <text x="-8" y="112" text-anchor="end" font-size="9" fill="#778">-40</text>
    <text x="-8" y="155" text-anchor="end" font-size="9" fill="#778">-60</text>
    <text x="-30" y="80" text-anchor="middle" font-size="10" fill="#556" transform="rotate(-90,-30,80)">Gain (dB)</text>
    <!-- X axis -->
    <text x="0" y="166" text-anchor="middle" font-size="9" fill="#778">-80</text>
    <text x="44" y="166" text-anchor="middle" font-size="9" fill="#778">-70</text>
    <text x="88" y="166" text-anchor="middle" font-size="9" fill="#778">-60</text>
    <text x="131" y="166" text-anchor="middle" font-size="9" fill="#778">-50</text>
    <text x="175" y="166" text-anchor="middle" font-size="9" fill="#778">-40</text>
    <text x="219" y="166" text-anchor="middle" font-size="9" fill="#778">-30</text>
    <text x="262" y="166" text-anchor="middle" font-size="9" fill="#778">-20</text>
    <text x="306" y="166" text-anchor="middle" font-size="9" fill="#778">-10</text>
    <text x="350" y="166" text-anchor="middle" font-size="9" fill="#778">0</text>
    <text x="175" y="180" text-anchor="middle" font-size="10" fill="#556">Input (dBFS)</text>
    <!-- Grid -->
    <line x1="0" y1="21" x2="350" y2="21" stroke="#dde" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="0" y1="64" x2="350" y2="64" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="107" x2="350" y2="107" stroke="#eef" stroke-width="0.5"/>

    <!-- Measured gain: -11.3, -20.6, -30.4, -40.3, -50.3, +3.5, +3.5, +3.5, +1.5 -->
    <!-- Y: +10=0, 0=21, -20=64, -40=107, -60=150. Scale: 2.14px per dB -->
    <!-- -80: -11.3 → y=21+11.3*2.14=45 -->
    <!-- -70: -20.6 → y=21+20.6*2.14=65 -->
    <!-- -60: -30.4 → y=21+30.4*2.14=86 -->
    <!-- -50: -40.3 → y=21+40.3*2.14=107 -->
    <!-- -40: -50.3 → y=21+50.3*2.14=129 -->
    <!-- -30: +3.5 → y=21-3.5*2.14=14 -->
    <!-- -20: +3.5 → y=14 -->
    <!-- -10: +3.5 → y=14 -->
    <!-- 0: +1.5 → y=21-1.5*2.14=18 -->

    <polyline points="0,45 44,65 88,86 131,107 175,129 219,14 262,14 306,14 350,18"
              fill="none" stroke="#2a7" stroke-width="2.5"/>
    <circle cx="0" cy="45" r="3" fill="#2a7"/>
    <circle cx="44" cy="65" r="3" fill="#2a7"/>
    <circle cx="88" cy="86" r="3" fill="#2a7"/>
    <circle cx="131" cy="107" r="3" fill="#2a7"/>
    <circle cx="175" cy="129" r="3" fill="#c44"/>
    <circle cx="219" cy="14" r="3" fill="#2a7"/>
    <circle cx="262" cy="14" r="3" fill="#2a7"/>
    <circle cx="306" cy="14" r="3" fill="#2a7"/>
    <circle cx="350" cy="18" r="3" fill="#2a7"/>

    <text x="225" y="10" font-size="8" fill="#2a7">+3.5</text>
    <text x="356" y="14" font-size="8" fill="#2a7">+1.5</text>
    <text x="181" y="125" font-size="8" fill="#c44">-50.3</text>

    <!-- Sharp threshold annotation -->
    <rect x="180" y="56" width="90" height="24" rx="3" fill="#fff8e8" stroke="#d4a54a" stroke-width="0.8"/>
    <text x="225" y="67" text-anchor="middle" font-size="8" fill="#d4a54a" font-weight="bold">sharp threshold</text>
    <text x="225" y="77" text-anchor="middle" font-size="8" fill="#d4a54a">between -40 and -30</text>
  </g>

  <!-- ================================================================ -->
  <!-- SIDECHAIN EXPLANATION -->
  <!-- ================================================================ -->
  <rect x="490" y="365" width="440" height="210" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="710" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#334">Measured Results</text>

  <g transform="translate(505,400)">
    <text x="0" y="0" font-size="10" font-weight="bold" fill="#445">Input</text>
    <text x="65" y="0" font-size="10" font-weight="bold" fill="#445">Output</text>
    <text x="135" y="0" font-size="10" font-weight="bold" fill="#445">Gain</text>
    <text x="195" y="0" font-size="10" font-weight="bold" fill="#445">Status</text>
    <line x1="0" y1="6" x2="380" y2="6" stroke="#ccd" stroke-width="0.8"/>

    <text x="0" y="19" font-size="10" fill="#99a">-80 dBFS</text>
    <text x="65" y="19" font-size="10" fill="#c44">-94.3 dB</text>
    <text x="135" y="19" font-size="10" fill="#c44">-11.3</text>
    <text x="195" y="19" font-size="10" fill="#c44">below threshold</text>

    <text x="0" y="34" font-size="10" fill="#99a">-60 dBFS</text>
    <text x="65" y="34" font-size="10" fill="#c44">-93.4 dB</text>
    <text x="135" y="34" font-size="10" fill="#c44">-30.4</text>
    <text x="195" y="34" font-size="10" fill="#c44">below threshold</text>

    <text x="0" y="49" font-size="10" fill="#99a">-40 dBFS</text>
    <text x="65" y="49" font-size="10" fill="#c44">-93.3 dB</text>
    <text x="135" y="49" font-size="10" fill="#c44">-50.3</text>
    <text x="195" y="49" font-size="10" fill="#c44">below threshold</text>

    <line x1="0" y1="57" x2="380" y2="57" stroke="#d4a54a" stroke-width="1" stroke-dasharray="3,2"/>

    <text x="0" y="71" font-size="10" fill="#445">-30 dBFS</text>
    <text x="65" y="71" font-size="10" fill="#2a7">-29.5 dB</text>
    <text x="135" y="71" font-size="10" fill="#2a7" font-weight="bold">+3.5</text>
    <text x="195" y="71" font-size="10" fill="#2a7">active (&#215;1.5 makeup)</text>

    <text x="0" y="86" font-size="10" fill="#445">-20 dBFS</text>
    <text x="65" y="86" font-size="10" fill="#2a7">-19.5 dB</text>
    <text x="135" y="86" font-size="10" fill="#2a7" font-weight="bold">+3.5</text>
    <text x="195" y="86" font-size="10" fill="#2a7">active (&#215;1.5 makeup)</text>

    <text x="0" y="101" font-size="10" fill="#445">-10 dBFS</text>
    <text x="65" y="101" font-size="10" fill="#2a7">-9.5 dB</text>
    <text x="135" y="101" font-size="10" fill="#2a7" font-weight="bold">+3.5</text>
    <text x="195" y="101" font-size="10" fill="#2a7">active (&#215;1.5 makeup)</text>

    <text x="0" y="116" font-size="10" fill="#445">  0 dBFS</text>
    <text x="65" y="116" font-size="10" fill="#2a7">-1.5 dB</text>
    <text x="135" y="116" font-size="10" fill="#d45" font-weight="bold">+1.5</text>
    <text x="195" y="116" font-size="10" fill="#d45">compressing (-2 dB GR)</text>

    <line x1="0" y1="124" x2="380" y2="124" stroke="#ccd" stroke-width="0.8"/>
    <text x="0" y="142" font-size="10" fill="#667">inGain=0.1 (-20 dB) shifts detector threshold.</text>
    <text x="0" y="156" font-size="10" fill="#667">Signals below -30 dBFS produce near-zero</text>
    <text x="0" y="170" font-size="10" fill="#667">in the LOG/EXP gain path &#8594; output silence.</text>
  </g>

  <!-- ================================================================ -->
  <!-- TEST ASSERTIONS -->
  <!-- ================================================================ -->
  <rect x="30" y="590" width="900" height="115" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="40" y="610" font-size="13" font-weight="bold" fill="#334">Test Assertions</text>

  <rect x="50" y="622" width="400" height="28" rx="4" fill="#eef7ee" stroke="#4a9"/>
  <text x="60" y="641" font-size="11" fill="#2a7" font-weight="bold">For input &#8805; -20 dBFS: output &gt; -50 dB</text>

  <rect x="470" y="622" width="440" height="28" rx="4" fill="#eef7ee" stroke="#4a9"/>
  <text x="480" y="641" font-size="11" fill="#2a7" font-weight="bold">assertNotNull(results): sim completes OK</text>

  <text x="50" y="672" font-size="10" fill="#667">LP envelope &#964; &#8776; 3 ms (coeff 0.1)  &#183;  LOG(-0.5, -0.125) / EXP(1,0)  &#183;  &#215;1.5 makeup = +3.5 dB  &#183;  Sidechain: gain from Input, applied to Side Chain</text>
  <text x="50" y="690" font-size="10" fill="#d45" font-weight="bold">Design note: </text>
  <text x="140" y="690" font-size="10" fill="#667">inGain=0.1 creates effective -30 dBFS threshold. Signals below this are gated, not limited.</text>
</svg>
