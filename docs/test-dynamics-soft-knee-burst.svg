<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Consolas, monospace" font-size="12">
  <defs>
    <linearGradient id="bgsk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#eef0f4"/>
    </linearGradient>
  </defs>

  <rect width="960" height="720" rx="12" fill="url(#bgsk)" stroke="#c0c4cc" stroke-width="1.5"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#223">Soft Knee Limiter &#8212; Tone Burst Envelope Test</text>
  <text x="480" y="48" text-anchor="middle" font-size="11" fill="#667">DynamicsEnvelopeTest.java  &#183;  440 Hz bursts, 200 ms on / 200 ms off, -80 to 0 dBFS</text>

  <!-- ================================================================ -->
  <!-- INPUT STAIRCASE -->
  <!-- ================================================================ -->
  <rect x="30" y="62" width="900" height="150" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="40" y="80" font-size="13" font-weight="bold" fill="#334">Input Signal  (9 ascending tone bursts)</text>

  <g transform="translate(60,90)">
    <!-- Y-axis -->
    <line x1="0" y1="0" x2="0" y2="105" stroke="#aab" stroke-width="0.8"/>
    <text x="-8" y="6" text-anchor="end" font-size="9" fill="#778">0 dB</text>
    <text x="-8" y="28" text-anchor="end" font-size="9" fill="#778">-20</text>
    <text x="-8" y="50" text-anchor="end" font-size="9" fill="#778">-40</text>
    <text x="-8" y="72" text-anchor="end" font-size="9" fill="#778">-60</text>
    <text x="-8" y="94" text-anchor="end" font-size="9" fill="#778">-80</text>
    <!-- X-axis -->
    <line x1="0" y1="105" x2="840" y2="105" stroke="#aab" stroke-width="0.8"/>
    <!-- Grid lines -->
    <line x1="0" y1="0" x2="840" y2="0" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="23" x2="840" y2="23" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="46" x2="840" y2="46" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="69" x2="840" y2="69" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="92" x2="840" y2="92" stroke="#eef" stroke-width="0.5"/>

    <!-- 9 bursts, each 93px wide (46 on, 47 off) -->
    <!-- -80 dBFS (height ≈ 1px from bottom) -->
    <rect x="0" y="104" width="46" height="1" fill="#3577d4" opacity="0.5"/>
    <text x="23" y="118" text-anchor="middle" font-size="8" fill="#99a">-80</text>
    <!-- -70 dBFS -->
    <rect x="93" y="100" width="46" height="5" fill="#3577d4" opacity="0.5"/>
    <text x="116" y="118" text-anchor="middle" font-size="8" fill="#99a">-70</text>
    <!-- -60 dBFS -->
    <rect x="186" y="92" width="46" height="13" fill="#3577d4" opacity="0.6"/>
    <text x="209" y="118" text-anchor="middle" font-size="8" fill="#99a">-60</text>
    <!-- -50 dBFS -->
    <rect x="279" y="79" width="46" height="26" fill="#3577d4" opacity="0.6"/>
    <text x="302" y="118" text-anchor="middle" font-size="8" fill="#99a">-50</text>
    <!-- -40 dBFS -->
    <rect x="372" y="59" width="46" height="46" fill="#3577d4" opacity="0.7"/>
    <text x="395" y="118" text-anchor="middle" font-size="8" fill="#99a">-40</text>
    <!-- -30 dBFS -->
    <rect x="465" y="36" width="46" height="69" fill="#3577d4" opacity="0.7"/>
    <text x="488" y="118" text-anchor="middle" font-size="8" fill="#99a">-30</text>
    <!-- -20 dBFS -->
    <rect x="558" y="23" width="46" height="82" fill="#3577d4" opacity="0.8"/>
    <text x="581" y="118" text-anchor="middle" font-size="8" fill="#99a">-20</text>
    <!-- -10 dBFS -->
    <rect x="651" y="12" width="46" height="93" fill="#3577d4" opacity="0.85"/>
    <text x="674" y="118" text-anchor="middle" font-size="8" fill="#99a">-10</text>
    <!-- 0 dBFS -->
    <rect x="744" y="1" width="46" height="104" fill="#3577d4" opacity="0.9"/>
    <text x="767" y="118" text-anchor="middle" font-size="8" fill="#99a">0</text>
  </g>

  <!-- ================================================================ -->
  <!-- GAIN TRANSFER CURVE (measured data) -->
  <!-- ================================================================ -->
  <rect x="30" y="225" width="440" height="230" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="250" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#334">Gain vs Input Level (measured)</text>

  <g transform="translate(80,260)">
    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="170" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="170" x2="370" y2="170" stroke="#aab" stroke-width="0.8"/>
    <!-- Y axis: gain -10 to +2 dB -->
    <text x="-8" y="5" text-anchor="end" font-size="9" fill="#778">+2</text>
    <text x="-8" y="39" text-anchor="end" font-size="9" fill="#778">0</text>
    <text x="-8" y="73" text-anchor="end" font-size="9" fill="#778">-2</text>
    <text x="-8" y="107" text-anchor="end" font-size="9" fill="#778">-4</text>
    <text x="-8" y="141" text-anchor="end" font-size="9" fill="#778">-6</text>
    <text x="-8" y="175" text-anchor="end" font-size="9" fill="#778">-8</text>
    <text x="-30" y="90" text-anchor="middle" font-size="10" fill="#556" transform="rotate(-90,-30,90)">Gain (dB)</text>
    <!-- X axis labels -->
    <text x="0" y="186" text-anchor="middle" font-size="9" fill="#778">-80</text>
    <text x="46" y="186" text-anchor="middle" font-size="9" fill="#778">-70</text>
    <text x="93" y="186" text-anchor="middle" font-size="9" fill="#778">-60</text>
    <text x="139" y="186" text-anchor="middle" font-size="9" fill="#778">-50</text>
    <text x="185" y="186" text-anchor="middle" font-size="9" fill="#778">-40</text>
    <text x="231" y="186" text-anchor="middle" font-size="9" fill="#778">-30</text>
    <text x="278" y="186" text-anchor="middle" font-size="9" fill="#778">-20</text>
    <text x="324" y="186" text-anchor="middle" font-size="9" fill="#778">-10</text>
    <text x="370" y="186" text-anchor="middle" font-size="9" fill="#778">0</text>
    <text x="185" y="200" text-anchor="middle" font-size="10" fill="#556">Input (dBFS)</text>
    <!-- Grid -->
    <line x1="0" y1="34" x2="370" y2="34" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="68" x2="370" y2="68" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="102" x2="370" y2="102" stroke="#eef" stroke-width="0.5"/>
    <line x1="0" y1="136" x2="370" y2="136" stroke="#eef" stroke-width="0.5"/>

    <!-- Measured gain curve: -1.9, -1.8, -1.5, -1.4, -1.3, -1.3, -1.4, -2.5, -6.9 -->
    <!-- Y: +2=0, 0=34, -2=68, -4=102, -6=136, -8=170. Scale: 17px per dB -->
    <polyline points="0,66 46,65 93,60 139,58 185,56 231,56 278,58 324,77 370,151"
              fill="none" stroke="#d45" stroke-width="2.5"/>
    <circle cx="0" cy="66" r="3" fill="#d45"/>
    <circle cx="46" cy="65" r="3" fill="#d45"/>
    <circle cx="93" cy="60" r="3" fill="#d45"/>
    <circle cx="139" cy="58" r="3" fill="#d45"/>
    <circle cx="185" cy="56" r="3" fill="#d45"/>
    <circle cx="231" cy="56" r="3" fill="#d45"/>
    <circle cx="278" cy="58" r="3" fill="#d45"/>
    <circle cx="324" cy="77" r="3" fill="#d45"/>
    <circle cx="370" cy="151" r="3" fill="#d45"/>

    <!-- Gain labels -->
    <text x="6" y="62" font-size="8" fill="#d45">-1.9</text>
    <text x="237" y="52" font-size="8" fill="#d45">-1.3</text>
    <text x="330" y="73" font-size="8" fill="#d45">-2.5</text>
    <text x="372" y="148" font-size="8" fill="#d45">-6.9</text>

    <!-- Compression knee annotation -->
    <line x1="278" y1="58" x2="278" y2="15" stroke="#d45" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="320" y="15" text-anchor="middle" font-size="9" fill="#d45" font-weight="bold">soft knee</text>
    <text x="320" y="26" text-anchor="middle" font-size="9" fill="#d45">onset ~-20 dBFS</text>
  </g>

  <!-- ================================================================ -->
  <!-- OUTPUT LEVEL TABLE -->
  <!-- ================================================================ -->
  <rect x="490" y="225" width="440" height="230" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="710" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="#334">Measured Results</text>

  <g transform="translate(505,260)">
    <!-- Header -->
    <text x="0" y="0" font-size="10" font-weight="bold" fill="#445">Input</text>
    <text x="70" y="0" font-size="10" font-weight="bold" fill="#445">Output</text>
    <text x="140" y="0" font-size="10" font-weight="bold" fill="#445">Gain</text>
    <text x="200" y="0" font-size="10" font-weight="bold" fill="#445">Attack</text>
    <text x="270" y="0" font-size="10" font-weight="bold" fill="#445">Release</text>
    <line x1="0" y1="6" x2="350" y2="6" stroke="#ccd" stroke-width="0.8"/>

    <!-- Data rows -->
    <text x="0" y="20" font-size="10" fill="#667">-80 dBFS</text>
    <text x="70" y="20" font-size="10" fill="#445">-84.9 dB</text>
    <text x="140" y="20" font-size="10" fill="#445">-1.9 dB</text>
    <text x="200" y="20" font-size="10" fill="#99a">&lt;2 ms</text>
    <text x="270" y="20" font-size="10" fill="#99a">&lt;2 ms</text>

    <text x="0" y="38" font-size="10" fill="#667">-60 dBFS</text>
    <text x="70" y="38" font-size="10" fill="#445">-64.5 dB</text>
    <text x="140" y="38" font-size="10" fill="#445">-1.5 dB</text>
    <text x="200" y="38" font-size="10" fill="#99a">&lt;2 ms</text>
    <text x="270" y="38" font-size="10" fill="#99a">&lt;2 ms</text>

    <text x="0" y="56" font-size="10" fill="#667">-40 dBFS</text>
    <text x="70" y="56" font-size="10" fill="#445">-44.3 dB</text>
    <text x="140" y="56" font-size="10" fill="#445">-1.3 dB</text>
    <text x="200" y="56" font-size="10" fill="#99a">&lt;2 ms</text>
    <text x="270" y="56" font-size="10" fill="#99a">&lt;2 ms</text>

    <text x="0" y="74" font-size="10" fill="#667">-20 dBFS</text>
    <text x="70" y="74" font-size="10" fill="#445">-24.4 dB</text>
    <text x="140" y="74" font-size="10" fill="#d45">-1.4 dB</text>
    <text x="200" y="74" font-size="10" fill="#99a">&lt;2 ms</text>
    <text x="270" y="74" font-size="10" fill="#99a">&lt;2 ms</text>

    <text x="0" y="92" font-size="10" fill="#667">-10 dBFS</text>
    <text x="70" y="92" font-size="10" fill="#445">-15.5 dB</text>
    <text x="140" y="92" font-size="10" fill="#d45" font-weight="bold">-2.5 dB</text>
    <text x="200" y="92" font-size="10" fill="#99a">&lt;2 ms</text>
    <text x="270" y="92" font-size="10" fill="#99a">&lt;2 ms</text>

    <text x="0" y="110" font-size="10" fill="#667">  0 dBFS</text>
    <text x="70" y="110" font-size="10" fill="#445"> -9.9 dB</text>
    <text x="140" y="110" font-size="10" fill="#d45" font-weight="bold">-6.9 dB</text>
    <text x="200" y="110" font-size="10" fill="#99a">&lt;2 ms</text>
    <text x="270" y="110" font-size="10" fill="#99a">&lt;2 ms</text>

    <line x1="0" y1="118" x2="350" y2="118" stroke="#ccd" stroke-width="0.8"/>
    <text x="0" y="136" font-size="10" fill="#667">Attack/release appear instant because output</text>
    <text x="0" y="150" font-size="10" fill="#667">= gain &#215; input, and input is zero during silence.</text>
    <text x="0" y="164" font-size="10" fill="#667">Gain envelope has &#964; &#8776; 30 ms (LP coeff 0.001).</text>
  </g>

  <!-- ================================================================ -->
  <!-- ENVELOPE VISUALIZATION -->
  <!-- ================================================================ -->
  <rect x="30" y="468" width="900" height="120" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="40" y="488" font-size="13" font-weight="bold" fill="#334">Output Envelope (dB, ~2 ms resolution)</text>

  <g transform="translate(60,500)">
    <!-- Y-axis scale -->
    <text x="-8" y="6" text-anchor="end" font-size="9" fill="#778">0 dB</text>
    <text x="-8" y="22" text-anchor="end" font-size="9" fill="#778">-20</text>
    <text x="-8" y="38" text-anchor="end" font-size="9" fill="#778">-40</text>
    <text x="-8" y="54" text-anchor="end" font-size="9" fill="#778">-60</text>
    <text x="-8" y="70" text-anchor="end" font-size="9" fill="#778">-80</text>
    <line x1="0" y1="0" x2="0" y2="75" stroke="#aab" stroke-width="0.8"/>
    <line x1="0" y1="75" x2="840" y2="75" stroke="#aab" stroke-width="0.8"/>

    <!-- Burst boundaries (vertical dashed) -->
    <line x1="46" y1="0" x2="46" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="93" y1="0" x2="93" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="139" y1="0" x2="139" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="186" y1="0" x2="186" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="232" y1="0" x2="232" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="279" y1="0" x2="279" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="325" y1="0" x2="325" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="372" y1="0" x2="372" y2="75" stroke="#dde" stroke-width="0.5" stroke-dasharray="2,2"/>

    <!-- Output envelope: bursts at measured output levels -->
    <!-- -80: out=-84.9 → y≈80 (off chart) show as thin line at bottom -->
    <rect x="0" y="74" width="43" height="1" fill="#2a7" opacity="0.3"/>
    <!-- -70: out=-74.8 → y≈70 -->
    <rect x="93" y="70" width="43" height="5" fill="#2a7" opacity="0.4"/>
    <!-- -60: out=-64.5 → y≈60 -->
    <rect x="186" y="60" width="43" height="15" fill="#2a7" opacity="0.5"/>
    <!-- -50: out=-54.4 → y≈51 -->
    <rect x="279" y="51" width="43" height="24" fill="#2a7" opacity="0.55"/>
    <!-- -40: out=-44.3 → y≈41 -->
    <rect x="372" y="41" width="43" height="34" fill="#2a7" opacity="0.6"/>
    <!-- -30: out=-34.3 → y≈32 -->
    <rect x="465" y="32" width="43" height="43" fill="#2a7" opacity="0.65"/>
    <!-- -20: out=-24.4 → y≈23 -->
    <rect x="558" y="23" width="43" height="52" fill="#2a7" opacity="0.7"/>
    <!-- -10: out=-15.5 → y≈15 -->
    <rect x="651" y="15" width="43" height="60" fill="#2a7" opacity="0.8"/>
    <!-- 0: out=-9.9 → y≈9 -->
    <rect x="744" y="9" width="43" height="66" fill="#2a7" opacity="0.9"/>

    <!-- Input outline (for comparison) -->
    <rect x="0" y="74" width="43" height="1" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="93" y="69" width="43" height="6" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="186" y="56" width="43" height="19" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="279" y="44" width="43" height="31" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="372" y="38" width="43" height="37" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="465" y="28" width="43" height="47" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="558" y="19" width="43" height="56" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="651" y="9" width="43" height="66" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
    <rect x="744" y="0" width="43" height="75" fill="none" stroke="#3577d4" stroke-width="0.5" stroke-dasharray="2,1"/>
  </g>

  <!-- Legend -->
  <rect x="60" y="585" width="12" height="8" fill="#2a7" opacity="0.7"/>
  <text x="78" y="593" font-size="10" fill="#445">Output level</text>
  <rect x="180" y="585" width="12" height="8" fill="none" stroke="#3577d4" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="198" y="593" font-size="10" fill="#445">Input level</text>
  <text x="340" y="593" font-size="10" fill="#d45">Compression visible at -10 and 0 dBFS (output shorter than input)</text>

  <!-- ================================================================ -->
  <!-- TEST ASSERTIONS -->
  <!-- ================================================================ -->
  <rect x="30" y="608" width="900" height="100" rx="8" fill="#fff" stroke="#b0b8c4"/>
  <text x="40" y="628" font-size="13" font-weight="bold" fill="#334">Test Assertions</text>

  <rect x="50" y="636" width="400" height="28" rx="4" fill="#eef7ee" stroke="#4a9"/>
  <text x="60" y="655" font-size="11" fill="#2a7" font-weight="bold">For input &#8805; -20 dBFS: output &gt; -40 dB</text>

  <rect x="470" y="636" width="440" height="28" rx="4" fill="#eef7ee" stroke="#4a9"/>
  <text x="480" y="655" font-size="11" fill="#2a7" font-weight="bold">Compression: gain@0dB &lt; gain@-40dB + 3</text>

  <text x="50" y="695" font-size="10" fill="#667">LP envelope &#964; &#8776; 30 ms (coeff 0.001 @ 32768 Hz)  &#183;  LOG(-0.4, -0.25) / EXP(1,0) soft-knee curve  &#183;  &#215;6 output makeup gain</text>
</svg>
